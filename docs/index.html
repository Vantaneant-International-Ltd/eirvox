<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Ireland's premium marketplace for enthusiast objects. Verified sellers, reservation deposits, authenticated items. Starting with Automotive." />
    <meta name="theme-color" content="#F5F2ED" />
    <meta name="robots" content="index, follow" />
    <meta name="format-detection" content="telephone=no" />
    <!-- strict-origin-when-cross-origin keeps Referer to same-origin
         on same-origin nav, sends only origin on cross-origin nav,
         and sends nothing on HTTPS→HTTP downgrades. Stops outbound
         link clicks from leaking PKCE ?code= via Referer. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Open Graph / Twitter defaults (overridden per route by seo.ts) -->
    <meta property="og:title" content="ÉIRVOX · Ireland's Premium Marketplace" />
    <meta property="og:description" content="Ireland's premium marketplace for enthusiast objects. Verified sellers, reservation deposits, authenticated items." />
    <meta property="og:url" content="https://eirvox.ie/" />
    <meta property="og:image" content="https://eirvox.ie/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ÉIRVOX" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ÉIRVOX · Ireland's Premium Marketplace" />
    <meta name="twitter:description" content="Ireland's premium marketplace for enthusiast objects." />

    <link rel="canonical" href="https://eirvox.ie/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts moved out of app.css @import so they fetch in parallel with
         the bundle instead of after CSS parse. Same families/weights. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@1,400;1,500&display=swap" />
    <link rel="icon" type="image/png" href="/brand/symbol.png" />
    <link rel="apple-touch-icon" href="/brand/symbol.png" />
    <title>ÉIRVOX · Ireland's Premium Marketplace</title>

    <!-- ============================================================
         Google Analytics (gtag.js) with Consent Mode v2
         ============================================================
         GA loads on every page but is GATED on cookie consent. Default
         is "denied" for analytics_storage; CookieBanner.svelte flips
         to "granted" on Accept all, leaves denied on Essential only.
         Until granted, gtag drops no cookies + sends only cookie-less
         pings (advanced consent mode = ad/analytics measurement
         without identifying the user). GDPR-compliant.

         Auto-pageview is disabled (send_page_view: false) because hash
         routing means GA's auto-pageview only fires once. src/lib/
         analytics.ts subscribes to currentPath and emits page_view on
         every navigation. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SNEJVZK2LE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());

      // Read existing consent set on a prior visit BEFORE first config call
      var EVX_CONSENT_KEY = 'eirvox-cookie-consent';
      var __evxConsent = null;
      try { __evxConsent = localStorage.getItem(EVX_CONSENT_KEY); } catch (e) {}
      var __evxAnalyticsGranted = __evxConsent === 'all';

      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: __evxAnalyticsGranted ? 'granted' : 'denied',
        wait_for_update: 500
      });

      gtag('config', 'G-SNEJVZK2LE', {
        anonymize_ip: true,
        send_page_view: false   // SPA hash-routing tracker emits pageviews instead
      });
    </script>
    <script type="module" crossorigin src="/assets/index-D8rBKCJR.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-gA8tcK4I.css">
