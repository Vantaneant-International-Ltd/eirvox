<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all GitHub Pages 404s to index.html, preserving the path
      // as a hash fragment so svelte-spa-router can resolve the route.
      const path = window.location.pathname || '/'
      window.location.replace('/#' + path)
    </script>
  </head>
  <body></body>
</html>
